name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: PYTHONPATH=src python -m pytest -q
      - name: MCP audit gate (fail on HIGH+)
        run: PYTHONPATH=src python -m airte.mcp_audit.scanner examples/vulnerable_mcp_server.py --fail-on HIGH || echo "::warning::vulnerable example flagged as expected"
  redteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Red-team regression (EchoTarget baseline)
        # EchoTarget is intentionally vulnerable; record the baseline ASR without
        # failing the job (gate real targets in your own pipeline instead).
        run: PYTHONPATH=src python -m airte.redteam.harness --suite all --format json --fail-on-asr 1.0
