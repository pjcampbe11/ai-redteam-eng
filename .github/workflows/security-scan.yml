name: security-scan
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  schedule:
    - cron: '0 6 * * 1'
permissions:
  contents: read
  security-events: write
jobs:
  mcp-sarif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install -e .
      - name: MCP audit scan -> SARIF
        run: PYTHONPATH=src python -m airte.mcp_audit.scanner . --format sarif > airte.sarif || true
      - name: Upload SARIF to the Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: airte.sarif
          category: airte-mcp-audit
